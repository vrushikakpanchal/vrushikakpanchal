<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#050710"/>
    </radialGradient>
    <linearGradient id="orbCoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#A742F5"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>
  </defs>

  <rect width="640" height="640" fill="url(#orbBg)"/>

  <circle cx="320" cy="320" r="140" fill="none" stroke="#A742F5" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 6"/>
