      <image href="https://cdn.simpleicons.org/streamlit/FF4B4B" x="514.5" y="423.0" width="44" height="44"/>
      <text x="536.5" y="483.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9aa4bd">Streamlit</text>
