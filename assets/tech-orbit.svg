  <circle cx="320" cy="320" r="62" fill="#0a0c16" stroke="url(#orbCoreGrad)" stroke-width="2">
    <animate attributeName="r" values="60;65;60" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="320" y="316" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" font-weight="700" fill="url(#orbCoreGrad)">AI / ML</text>
  <text x="320" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7d87a0">core stack</text>
</svg>