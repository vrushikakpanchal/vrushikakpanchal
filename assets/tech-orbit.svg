      <text x="320.0" y="608.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9aa4bd">Tableau</text>
    </g>

    <g>
      <circle cx="103.5" cy="445.0" r="30.0" fill="#0d0f1a" stroke="#4479A1" stroke-opacity="0.5" stroke-width="1.2"/>
      <image href="https://cdn.simpleicons.org/mysql/4479A1" x="81.5" y="423.0" width="44" height="44"/>
      <text x="103.5" y="483.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9aa4bd">SQL</text>
