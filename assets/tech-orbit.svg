      <image href="https://cdn.simpleicons.org/scikitlearn/F7931E" x="298.0" y="438.0" width="44" height="44"/>
      <text x="320.0" y="498.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9aa4bd">Scikit-learn</text>
    </g>

    <g>
